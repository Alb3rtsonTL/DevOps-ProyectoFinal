name: CI/CD · Docker Hub + Render Deploy

# Trigger
# Se ejecuta en cada push a main
on:
  push:
    branches:
      - main

# Variables de entorno globales
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-proyectofinal

# Jobs
jobs:

  # JOB 1 · Construir y subir la imagen a Docker Hub
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Clonar el código del repositorio
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      # Iniciar sesión en Docker Hub usando los secretos del repo
      - name: 🔐 Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Configurar Docker Buildx (builder avanzado, soporte multi-platform)
      - name: ⚙️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Extraer metadata para el tag de la imagen
      # Genera tags automáticos: latest + SHA del commit
      - name: 🏷️ Extraer metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Construir la imagen y hacer push a Docker Hub
      - name: 🔨 Build & Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache entre builds para acelerar el proceso
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # JOB 2 · Desplegar en Render.com
  deploy-render:
    name: 🚀 Deploy en Render.com
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Render expone un Deploy Hook URL por servicio.
      # Un simple HTTP POST a esa URL dispara el redeploy automático.
      - name: 🔄 Trigger deploy en Render
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json"

      # Esperar y verificar que el deploy terminó
      - name: ✅ Deploy completado
        run: echo "Deploy enviado a Render.com correctamente"